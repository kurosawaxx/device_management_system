services:
  db:
    image: mariadb:lts
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: device_management
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./docker/php
      network: host
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: ./docker/php
      network: host
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8005:80"
      - "8443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && node_modules/.bin/next dev --webpack --hostname 0.0.0.0 --port 3005"
    ports:
      - "3005:3005"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8005
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
